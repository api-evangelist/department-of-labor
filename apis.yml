aid: department-of-labor
name: Department of Labor
description: >-
  The U.S. Department of Labor (DOL) is the federal department that fosters,
  promotes, and develops the welfare of wage earners, job seekers, and
  retirees, improves working conditions, advances opportunities for
  profitable employment, and assures work-related benefits and rights. DOL
  exposes a portfolio of public APIs and data feeds including the modernized
  DOL APIv4 served from the DOL Open Data Portal, the Bureau of Labor
  Statistics Public Data API, the DOL Enforcement Data site, and Data.gov.
type: Index
