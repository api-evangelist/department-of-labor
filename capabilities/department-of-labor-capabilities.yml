name: Department of Labor Capabilities
description: >-
  Capabilities exposed by DOL public APIs and feeds, including the DOL Open
  Data API v4, the BLS Public Data API, the DOL Enforcement Data site, and
  the DOL Open Data Catalog.
capabilities:
  - name: Dataset Discovery
    description: Browse the DOL data catalog of more than 200 datasets in JSON.
    api: department-of-labor:dol-api-v4
  - name: Dataset Retrieval
    description: Pull dataset records from DOL APIv4 endpoints with API key authentication.
    api: department-of-labor:dol-api-v4
  - name: API Key Issuance
    description: Register on the DOL Data Portal to obtain an API key.
    api: department-of-labor:dol-api-v4
  - name: BLS Series Retrieval
    description: Retrieve historical BLS time series in JSON or Excel.
    api: department-of-labor:bls-public-data-api
  - name: Multi-Series Requests
    description: Fetch up to 50 series in a single POST request on v2.
    api: department-of-labor:bls-public-data-api
  - name: Long Time Range Requests
    description: Retrieve up to 20 years of data per request on v2.
    api: department-of-labor:bls-public-data-api
  - name: Registration Key Authentication
    description: Authenticate BLS calls with a registrationkey query parameter.
    api: department-of-labor:bls-public-data-api
  - name: Enforcement Records
    description: Access WHD, OSHA, MSHA, OFCCP, and EBSA enforcement records.
    api: department-of-labor:dol-enforcement-data
  - name: API Sampler
    description: Explore APIv4 endpoints interactively in the browser.
    api: department-of-labor:dol-api-sampler
  - name: Dataset Catalog Browsing
    description: Search and discover DOL datasets on Data.gov.
    api: department-of-labor:dol-open-data-catalog
  - name: Dataset Download
    description: Retrieve dataset resources via the Data.gov CKAN API.
    api: department-of-labor:dol-open-data-catalog
